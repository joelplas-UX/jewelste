[build]
  publish = "."

[[redirects]]
  from = "/agenda-van-jewelste"
  to   = "/agenda.html"
  status = 301

[[redirects]]
  from = "/boek-ons"
  to   = "/boek-ons.html"
  status = 301

[[redirects]]
  from = "/over-ons"
  to   = "/over-ons.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
